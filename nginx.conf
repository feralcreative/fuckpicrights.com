server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for static assets (logos, fonts, evidence images).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Shorter cache for the stylesheet, which changes more often.
    location = /style.css {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Sensible defaults.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css image/svg+xml application/javascript;
}
